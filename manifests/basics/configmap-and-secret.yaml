# configmap.yaml — Application configuration as a ConfigMap
#
# ConfigMaps store non-sensitive key-value data.
# Two usage patterns:
#   1. envFrom/env — inject as environment variables
#   2. volumeMounts  — mount as files (better for config files / hot reload)

apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
  namespace: default
  labels:
    app: demo-app
data:
  # Simple key=value (used with envFrom or env.valueFrom)
  APP_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "8080"

  # Multi-line value — mounted as a file via volumeMount
  app.properties: |
    server.port=8080
    logging.level=INFO
    cache.ttl=300
    feature.newui=true

---
# secret.yaml — Sensitive values as a Secret
#
# Secrets are base64-encoded by default (NOT encrypted at rest unless
# you configure envelope encryption with KMS).
#
# Best practices:
#   - Never commit real secrets to git — use sealed-secrets or external-secrets-operator
#   - Use `stringData` for human-readable input (K8s encodes it for you)
#   - Prefer external secret stores (AWS SSM, Vault, GCP Secret Manager) in production

apiVersion: v1
kind: Secret
metadata:
  name: demo-app-secrets
  namespace: default
  labels:
    app: demo-app
type: Opaque

# stringData: plain text — Kubernetes encodes to base64 automatically
# Use this for readability in dev/staging manifests
stringData:
  db-password: "changeme-use-external-secrets-in-prod"
  api-key: "changeme-use-external-secrets-in-prod"

# data: base64-encoded values
# echo -n 'mypassword' | base64  -->  bXlwYXNzd29yZA==
# data:
#   db-password: bXlwYXNzd29yZA==
