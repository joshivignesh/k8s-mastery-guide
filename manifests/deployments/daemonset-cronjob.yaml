# daemonset.yaml — DaemonSet for node-level agents
#
# DaemonSet ensures ONE pod runs on EVERY node (or a subset via nodeSelector).
# Use for: log shippers (Fluentd, Filebeat), monitoring agents (node-exporter),
#          network plugins (Cilium, Calico), security agents (Falco)
#
# New nodes automatically get the pod. Removed nodes clean up automatically.

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-shipper
  namespace: monitoring
  labels:
    app: log-shipper
spec:
  selector:
    matchLabels:
      app: log-shipper

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1  # Update one node at a time

  template:
    metadata:
      labels:
        app: log-shipper
    spec:
      serviceAccountName: log-shipper-sa

      # Allow scheduling on control-plane nodes (usually tainted)
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300

      # Access host filesystem for log collection
      # NOTE: host path mounts are privileged — limit to what's needed
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers

      containers:
        - name: log-shipper
          image: fluent/fluentd-kubernetes-daemonset:v1.16-debian-elasticsearch8-1
          resources:
            requests:
              cpu: "100m"
              memory: "200Mi"
            limits:
              cpu: "500m"
              memory: "500Mi"

          # DaemonSet pods often need host-level access
          securityContext:
            runAsUser: 0  # root required for /var/log access in some environments

          env:
            - name: FLUENT_ELASTICSEARCH_HOST
              value: "elasticsearch.monitoring.svc.cluster.local"
            - name: FLUENT_ELASTICSEARCH_PORT
              value: "9200"

          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true

      # Use host network for node-level agents that need host networking
      # hostNetwork: true  # Uncomment only if required (e.g., network plugins)

      # Run before regular workloads — ensures logging is ready
      priorityClassName: system-node-critical

---
# cronjob.yaml — CronJob for scheduled batch tasks
#
# CronJob creates a Job on a schedule (standard cron syntax).
# Use for: database backups, report generation, cache warming, cleanup tasks

apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: default
  labels:
    app: db-backup
spec:
  # Standard cron: minute hour day-of-month month day-of-week
  schedule: "0 2 * * *"   # Every day at 2:00 AM UTC

  # Timezone support (Kubernetes 1.27+)
  timeZone: "UTC"

  # What to do if a scheduled job is missed (e.g., cluster was down)
  # Allow: run the missed job; Forbid: skip it; Replace: cancel running, start new
  concurrencyPolicy: Forbid

  # Keep last N successful/failed job pods for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  # If a job doesn't start within this many seconds of schedule, skip it
  startingDeadlineSeconds: 300

  jobTemplate:
    spec:
      # Retry failed jobs up to N times
      backoffLimit: 2
      # Kill the job if it runs longer than this (seconds)
      activeDeadlineSeconds: 3600  # 1 hour max

      template:
        metadata:
          labels:
            app: db-backup
        spec:
          restartPolicy: OnFailure  # Jobs must use OnFailure or Never (not Always)

          serviceAccountName: db-backup-sa

          containers:
            - name: backup
              image: postgres:15-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="backup_${TIMESTAMP}.sql.gz"

                  echo "Starting backup: $BACKUP_FILE"
                  pg_dump \
                    -h "$POSTGRES_HOST" \
                    -U "$POSTGRES_USER" \
                    -d "$POSTGRES_DB" \
                    | gzip > "/backups/$BACKUP_FILE"

                  echo "Backup complete: $BACKUP_FILE"

              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"

              env:
                - name: POSTGRES_HOST
                  value: "postgres-0.postgres.default.svc.cluster.local"
                - name: POSTGRES_DB
                  value: "appdb"
                - name: POSTGRES_USER
                  value: "appuser"
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secrets
                      key: password

              volumeMounts:
                - name: backups
                  mountPath: /backups

          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: backup-storage
