# values.yaml — Default values for the demo-app Helm chart
#
# Override any value with:
#   helm install demo-app ./helm/demo-app -f my-values.yaml
#   helm install demo-app ./helm/demo-app --set image.tag=2.0.0
#
# Environment-specific overrides (recommended pattern):
#   values/
#     staging.yaml   — lower replicas, smaller limits, staging image tag
#     production.yaml — full replicas, production limits, pinned image tag

# ─────────────────────────────────────────────
# Image
# ─────────────────────────────────────────────
image:
  repository: your-registry/demo-app
  tag: "1.0.0"
  pullPolicy: IfNotPresent
  pullSecrets: []
  # pullSecrets:
  #   - name: registry-credentials

# ─────────────────────────────────────────────
# Replicas & Scaling
# ─────────────────────────────────────────────
replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ─────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# ─────────────────────────────────────────────
# Service
# ─────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

# ─────────────────────────────────────────────
# Ingress
# ─────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: demo-app-tls
      hosts:
        - app.example.com

# ─────────────────────────────────────────────
# Health Probes
# ─────────────────────────────────────────────
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 0
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    path: /ready
    periodSeconds: 10
    failureThreshold: 3
  startup:
    path: /healthz
    failureThreshold: 30
    periodSeconds: 10

# ─────────────────────────────────────────────
# Environment & Config
# ─────────────────────────────────────────────
env:
  APP_ENV: production
  LOG_LEVEL: info
  PORT: "8080"

# Extra environment variables from secrets (not stored in chart)
extraEnvFrom: []
# extraEnvFrom:
#   - secretRef:
#       name: demo-app-external-secrets

# ─────────────────────────────────────────────
# Pod settings
# ─────────────────────────────────────────────
podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

terminationGracePeriodSeconds: 60

# ─────────────────────────────────────────────
# Scheduling
# ─────────────────────────────────────────────
nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: demo-app

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: demo-app

# ─────────────────────────────────────────────
# PodDisruptionBudget
# ─────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# ─────────────────────────────────────────────
# RBAC
# ─────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""   # If empty, uses chart fullname
  automountServiceAccountToken: false
  annotations: {}
  # For IRSA (AWS IAM roles for service accounts):
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/demo-app-role

# ─────────────────────────────────────────────
# Monitoring
# ─────────────────────────────────────────────
monitoring:
  enabled: false   # Set true if Prometheus Operator is installed
  serviceMonitor:
    interval: 30s
    path: /metrics

# ─────────────────────────────────────────────
# Extra volumes / mounts
# ─────────────────────────────────────────────
extraVolumes:
  - name: tmp
    emptyDir: {}

extraVolumeMounts:
  - name: tmp
    mountPath: /tmp
